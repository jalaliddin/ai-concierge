upstream backend {
    server backend:8000;
}

upstream landing {
    server landing:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ─── Laravel Backend API ───────────────────────────────────────────────────
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Laravel storage / uploaded files
    location /storage/ {
        proxy_pass http://backend/storage/;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # ─── Vue SPA – Static Assets ───────────────────────────────────────────────
    # Vite builds assets into /assets/ with content-hashed filenames
    location /assets/ {
        root /var/www/frontend;
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # PWA manifest and service worker
    location ~* ^/(manifest\.json|sw\.js|workbox-[^/]+\.js)$ {
        root /var/www/frontend;
        try_files $uri @nuxt_fallback;
        expires 1d;
        access_log off;
    }

    # ─── Vue SPA – Admin Panel ─────────────────────────────────────────────────
    location /admin {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Vue SPA – Guest QR App ────────────────────────────────────────────────
    location /h {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Nuxt SSR Landing (everything else) ───────────────────────────────────
    location / {
        proxy_pass http://landing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass                 $http_upgrade;
    }

    location @nuxt_fallback {
        proxy_pass http://landing;
        proxy_set_header Host $host;
    }

    # ─── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
    }
}
